<div *ngIf="status === 'success'">
  <h1>✅ Sistema en Línea</h1>
  <button (click)="simularCarga()">Probar Loading</button>
  <button (click)="simularError()">Probar Error</button>
</div>

<div *ngIf="status === 'loading'">
  <p>Conectando con el servidor...</p>
</div>

<div *ngIf="status === 'error'">
  <h1>⚠️ Error de Conexión</h1>
  <button (click)="status = 'success'">Reintentar</button>
</div>
